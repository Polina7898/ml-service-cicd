version: "3.9"

services:
  ml-green:
    image: ghcr.io/pmasljukova/ml-service:v1.1.0
    build:
      context: .
      args:
        APP_VERSION: v1.1.0
    container_name: ml-green
    environment:
      APP_VERSION: v1.1.0
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - mlnet

networks:
  mlnet:
    external: true
    name: ml-service-cicd_mlnet
