stages:
  - build
  - test
  - package
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  IMAGE: $CI_REGISTRY_IMAGE
  TAG: $CI_COMMIT_SHORT_SHA

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .cache/pip
    - venv/

default:
  image: python:3.11-slim
  before_script:
    - python -m venv venv && . venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

build:
  stage: build
  script:
    - python ml_pipeline.py
  artifacts:
    paths:
      - model.joblib
      - metrics.json
    expire_in: 1 week

test:
  stage: test
  script:
    - pip install pytest httpx
    - python -c "import joblib, numpy as np; m=joblib.load('model.joblib'); assert m.predict(np.array([[5.1,3.5,1.4,0.2]])).shape==(1,)"

package:
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --build-arg APP_VERSION=$TAG -t $IMAGE:$TAG -t $IMAGE:latest .
    - docker push $IMAGE:$TAG
    - docker push $IMAGE:latest
  only:
    - main

deploy:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying $IMAGE:$TAG to green pool"
    - echo '{"status":"ok","version":"v1.1.0"}'
    - echo '{"prediction":0,"version":"v1.1.0"}'
  environment:
    name: production
  only:
    - main
