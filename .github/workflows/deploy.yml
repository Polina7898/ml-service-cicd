name: Model Deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Make pipeline reproducible
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip freeze > requirements.lock
          python ml_pipeline.py
          echo "MODEL_VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build --build-arg APP_VERSION=${{ env.MODEL_VERSION }} \
            -t ml-service:${{ github.sha }} \
            -t ml-service:${{ env.MODEL_VERSION }} .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts
          path: |
            model.joblib
            metrics.json
            requirements.lock

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy green pool
        run: echo "Deploy image ml-service:${{ github.sha }} to green pool"

      - name: Smoke test /health
        run: echo '{"status":"ok","version":"v1.1.0"}'

      - name: Smoke test /predict
        run: echo '{"prediction":0,"version":"v1.1.0"}'

      - name: Switch traffic to green
        run: echo "Traffic switched to green pool via nginx reload"

      - name: Rollback on failure
        if: failure()
        run: echo "Rollback to blue pool"
