upstream ml_blue  { server ml-blue:8000;  }
upstream ml_green { server ml-green:8000; }

# Canary: 10% трафика на green, 90% на blue
split_clients "${remote_addr}${request_id}" $ml_pool {
    10%     ml_green;
    *       ml_blue;
}

server {
    listen 80;

    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Blue-Green: переключение между blue и green здесь
    location / {
        proxy_pass http://ml_blue;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Active-Pool blue;
    }
}
